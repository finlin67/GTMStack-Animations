name: Content Check

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  content-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node LTS
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate metadata
        run: npm run validate:meta

      - name: Build index
        run: npm run build:index

      - name: Ensure dist index is up to date
        run: git diff --exit-code -- dist/animations.index.json

      - name: Upload index artifact
        uses: actions/upload-artifact@v4
        with:
          name: animations-index
          path: dist/animations.index.json
